<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface-alt: #faf9f5;
    --text: #1f1f1f;
    --muted: #6f6f6f;
    --border: #e3e0d6;
    --border-strong: #c9c4b4;
    --accent: #7a5635;
    --accent-soft: #ebe1d2;
    --c-coffee: #6f4e37;
    --c-bakery: #b89464;
    --c-tea: #5b8a72;
    --c-dessert: #c66980;
    --c-specialty: #7b6cb8;
    --c-late: #3f4f8a;
    --c-work: #2e7d4f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-size: 14px;
    line-height: 1.45;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: 14px 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-shrink: 0;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.015em;
  }
  .freshness { font-size: 12px; color: var(--muted); }

  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    flex-shrink: 0;
  }
  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-row + .filter-row { margin-top: 6px; }
  .filter-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; min-width: 70px;
  }
  .chip {
    padding: 4px 10px; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 12.5px; font-weight: 500; color: var(--text);
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.1s, border-color 0.1s;
  }
  .chip:hover { background: var(--surface-alt); border-color: var(--border-strong); }
  .chip.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip .chip-icon { font-size: 13px; line-height: 1; }
  .chip .num { font-size: 11px; color: var(--muted); font-weight: 500; }
  .chip.active .num { color: rgba(255,255,255,0.6); }
  .chip.themed .num { color: inherit; opacity: 0.65; }
  .chip.themed.active .num { color: rgba(255,255,255,0.7); opacity: 1; }


  .layout { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; background: #e9e5dc; }
  .panel {
    width: 380px; background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
  }

  .search { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
  .search input {
    width: 100%; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: 6px;
    font-family: inherit; font-size: 13px;
    background: var(--bg); color: var(--text); outline: none;
  }
  .search input:focus { border-color: var(--accent); background: var(--surface); }
  .results-meta {
    padding: 8px 16px 6px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; border-bottom: 1px solid var(--border);
  }
  .list-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .shop-list { flex: 1; overflow-y: auto; margin: 0; padding: 0; list-style: none; min-height: 0; }
  .shop-item {
    padding: 10px 16px 10px 13px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    cursor: pointer; transition: background 0.1s;
  }
  .shop-item:hover { background: var(--surface-alt); }
  .shop-item.active { background: var(--accent-soft); }
  .shop-name {
    font-weight: 600; font-size: 14px;
    margin: 0 0 4px 0; line-height: 1.25;
    display: flex; align-items: center; gap: 8px;
  }
  .shop-name .shop-icon-tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    font-size: 11.5px; line-height: 1;
    flex-shrink: 0; color: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
  }
  .shop-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .shop-meta .rating { color: var(--text); font-weight: 500; }
  .shop-tags { font-size: 11.5px; color: var(--muted); line-height: 1.4; }
  .shop-tags .tag-sep { color: var(--border-strong); margin: 0 4px; }

  .detail-view { flex: 1; overflow-y: auto; display: none; min-height: 0; }
  .detail-view.visible { display: block; }
  .panel.detail-mode .list-view { display: none; }
  .back-btn {
    padding: 12px 16px; background: var(--surface);
    border: none; border-bottom: 1px solid var(--border);
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--muted); cursor: pointer; width: 100%;
    text-align: left; display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--text); }

  .detail-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); }
  .detail-cat {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 6px;
  }
  .detail-cat .dot { width: 8px; height: 8px; border-radius: 50%; }
  .detail-name {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 19px; line-height: 1.2;
    margin: 0 0 6px 0;
  }
  .detail-rating { font-size: 13px; color: var(--text); }
  .detail-rating .star { color: #c89b3c; }
  .detail-rating .muted { color: var(--muted); }
  .detail-section { padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .detail-section:last-of-type { border-bottom: none; }
  .detail-section-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; margin-bottom: 6px;
  }
  .detail-text { font-size: 13.5px; color: var(--text); }
  .detail-text-muted { font-size: 12.5px; color: var(--muted); }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .pill-tag {
    background: var(--bg); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px;
    font-size: 11.5px; color: var(--text);
  }
  .pill-tag.feature {
    background: var(--accent-soft); border-color: transparent;
    color: var(--accent); font-weight: 500;
  }
  .pill-tag.late { background: #e6ebf7; color: var(--c-late); border-color: transparent; }
  .pill-tag.work { background: #e2f1e8; color: var(--c-work); border-color: transparent; }

  .callout {

    border-left: 3px solid var(--accent); border-radius: 4px; margin-top: 8px;

  .callout-label {

    .filter-row { gap: 5px; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 2px 7px; font-size: 11.5px; gap: 4px; }
    .chip .chip-icon { font-size: 11.5px; }
    .chip .num { font-size: 10px; }

    .layout { flex-direction: column; }
    #map { flex: 0 0 220px; min-height: 180px; }
    .panel { width: 100%; height: auto; flex: 1; min-height: 0; border-left: none; border-top: 1px solid var(--border); }
    .search { padding: 8px 14px 6px; }

    .results-meta { padding: 5px 14px 4px; font-size: 10px; }
    .shop-item { padding: 7px 14px 7px 13px; }
    .shop-name { font-size: 13px; gap: 6px; margin: 0 0 3px 0; }
    .shop-name .shop-icon-tile { width: 18px; height: 18px; font-size: 10px; }
    .shop-meta { font-size: 11px; margin-bottom: 2px; }
    .shop-tags { font-size: 10.5px; }
    footer { display: none; }
  }
</style>

// Multiple shops can sit at the exact same building. Without offsetting,
// their pins (and labels) stack on top of each other. Group by coord and
// fan each group out in a tiny ring (~15m radius), and assign distinct
// label positions so the labels point in different directions.
(function spreadCoincidentShops() {
  const LABEL_POSITIONS = ['bottom', 'right', 'top', 'left'];
  const groups = new Map();
  SHOPS.forEach(s => {
    const k = `${s.lat.toFixed(5)},${s.lng.toFixed(5)}`;
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(s);
  });
  const radiusDeg = 0.00018; // ~20m
  groups.forEach(group => {
    if (group.length === 1) {
      group[0].labelPos = 'bottom';
      return;
    }
    const n = group.length;
    group.forEach((s, i) => {
      const angle = (i / n) * 2 * Math.PI - Math.PI / 2; // start at top, go clockwise
      const latCorrection = Math.cos(s.lat * Math.PI / 180) || 1;
      s.lat += radiusDeg * Math.cos(angle);
      s.lng += (radiusDeg * Math.sin(angle)) / latCorrection;
      s.labelPos = LABEL_POSITIONS[i % LABEL_POSITIONS.length];
    });
  });
})();

// Bayesian weighted rating (IMDB Top 250 formula):
//   WR = (v / (v + m)) * R + (m / (v + m)) * C
// Pulls under-reviewed shops toward the global mean so a 4.9 with 14 reviews
// doesn't outrank a 4.6 with 1,680. Sort order = "best overall".
(function computeWeightedRatings() {
  const rated = SHOPS.filter(s => typeof s.rating === 'number');
  const C = rated.reduce((acc, s) => acc + s.rating, 0) / rated.length;
  const counts = SHOPS.map(s => s.ratingNum || 0).slice().sort((a, b) => a - b);
  const m = counts[Math.floor(counts.length / 2)]; // median
  SHOPS.forEach(s => {
    const R = (typeof s.rating === 'number') ? s.rating : C;
    const v = s.ratingNum || 0;
    s.weightedRating = (v / (v + m)) * R + (m / (v + m)) * C;
  });
})();

function compactTags(shop) {
  const tags = [];
  const ln = LATE[shop.name];
  const cw = CWS[shop.name] || {};
  if (ln && ln.tier === 'midnight') tags.push('Until midnight');
  else if (ln) tags.push('Open late');
  if (cw.hasMeetingRoom) tags.push('Meeting room');
  else if (cw.tier === 'excellent') tags.push('Work-friendly');
  for (const item of (shop.loved || [])) {
    if (tags.length >= 3) break;
    tags.push(item);
  }
  return tags.slice(0, 3);
}

function bestForTags(shop) {
  const tags = [];
  const cw = CWS[shop.name] || {};
  const ln = LATE[shop.name];
  if (cw.tier === 'excellent') tags.push({ label: 'Work', cls: 'work', icon: '💻' });
  if (cw.hasMeetingRoom) tags.push({ label: 'Meetings', cls: 'work', icon: '🤝' });
  if (ln && ln.tier === 'midnight') tags.push({ label: 'Until midnight', cls: 'late', icon: '🦉' });
  else if (ln) tags.push({ label: 'Open late', cls: 'late', icon: '🌙' });
  return tags;
}

function makeChip({ label, count, color, icon, themeColor, onClick, isActive }) {
  const b = document.createElement('button');
  b.className = 'chip' + (isActive ? ' active' : '') + (themeColor ? ' themed' : '');
  b.type = 'button';
  b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  if (themeColor) {
    if (isActive) {
      b.style.background = themeColor;
      b.style.color = '#fff';
      b.style.borderColor = themeColor;
    } else {
      b.style.background = themeColor + '1f';
      b.style.borderColor = themeColor + '55';
      b.style.color = themeColor;
    }
  }
  if (icon) {
    const ic = document.createElement('span');
    ic.className = 'chip-icon';
    ic.textContent = icon;
    b.appendChild(ic);
  } else if (color) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = color;
    b.appendChild(dot);
  }
  b.appendChild(document.createTextNode(label));
  if (count != null) {
    const n = document.createElement('span');
    n.className = 'num';
    n.textContent = count;
    b.appendChild(n);
  }
  b.addEventListener('click', onClick);
  return b;
}

function renderChips() {
  catChipsEl.innerHTML = '';
  catChipsEl.style.display = 'inline-flex';
  catChipsEl.style.gap = '6px';
  catChipsEl.style.flexWrap = 'wrap';
  catChipsEl.appendChild(makeChip({
    label: 'All', count: SHOPS.length,
    onClick: () => { state.categories.clear(); render(); },
    isActive: state.categories.size === 0
  }));
  Object.keys(CATS).forEach(cat => {
    catChipsEl.appendChild(makeChip({
      label: cat.replace('+', ' & '),
      count: catCounts[cat] || 0,
      icon: CATS[cat].icon,
      themeColor: CATS[cat].hex,
      onClick: () => {
        if (state.categories.has(cat)) state.categories.delete(cat);
        else state.categories.add(cat);
        render();
      },
      isActive: state.categories.has(cat)
    }));
  });

  featChipsEl.innerHTML = '';
  featChipsEl.style.display = 'inline-flex';
  featChipsEl.style.gap = '6px';
  featChipsEl.style.flexWrap = 'wrap';
  const workCount = SHOPS.filter(s => (CWS[s.name]||{}).tier === 'excellent').length;

    { key: 'midnight', label: 'Until midnight', icon: '🦉', themeColor: '#2a2f5c', count: midnightCount }
  ];
  features.forEach(f => {
    featChipsEl.appendChild(makeChip({
      label: f.label, count: f.count, icon: f.icon, themeColor: f.themeColor,
      onClick: () => {
        if (state.features.has(f.key)) state.features.delete(f.key);
        else state.features.add(f.key);
        render();

      isActive: state.features.has(f.key)

// Show shop-name labels under pins. Below LABEL_MIN_ZOOM they're hidden;
// at or above, each visible label is greedily placed in the first of
// {bottom, right, top, left} that doesn't collide with already-placed
// labels (prioritized by weighted rating). Labels that can't fit anywhere
// are hidden until the user zooms in further.
const LABEL_MIN_ZOOM = 13;
function toggleLabels() {
  const el = map.getContainer();
  if (map.getZoom() >= LABEL_MIN_ZOOM) el.classList.add('with-labels');
  else el.classList.remove('with-labels');
}

// 16 candidate angles around each pin (in degrees, screen coords:
//   0° = right, 90° = up, 180° = left, 270° = down).
// Ordered so we prefer cardinals first, then diagonals, then in-betweens.
const LABEL_ANGLES = [
  270, 0, 90, 180,
  315, 45, 135, 225,
  292.5, 247.5, 337.5, 22.5,
  112.5, 67.5, 157.5, 202.5
];
const LABEL_GAP = 4;

function placeLabels() {
  const enabled = map.getZoom() >= LABEL_MIN_ZOOM;
  // Gather visible (non-clustered) pin labels
  const items = [];
  markers.forEach(m => {
    if (!m._icon) return;
    const pin = m._icon.querySelector('.pin');
    const label = m._icon.querySelector('.pin-label');
    if (!pin || !label) return;
    items.push({ pin, label, shop: m.shopRef });
  });
  if (!enabled || !items.length) {
    items.forEach(it => {
      it.label.style.visibility = '';
      it.label.style.transform = '';
    });
    return;
  }
  // Reset transforms to base centered, measure
  // Batch all CSS writes (resets of transform and visibility) to prevent layout thrashing
  items.forEach(it => {
    it.label.style.transform = 'translate(-50%, -50%)';
    it.label.style.visibility = 'visible';
  });

  // Do all getBoundingClientRect() reads in a separate loop
  const measured = items.map(it => {
    const pr = it.pin.getBoundingClientRect();
    const lr = it.label.getBoundingClientRect();
    return {
      it,
      cx: pr.left + pr.width / 2,
      cy: pr.top + pr.height / 2,
      pinR: Math.max(pr.width, pr.height) / 2,
      lw: lr.width, lh: lr.height
    };
  });

  // Seed the obstacle list with everything that's already on the map:
  //  - every individual pin (so a label can't slide over another pin)
  //  - every cluster bubble (so labels avoid the "+N" cluster markers)
  const obstacles = [];
  function pushRect(el, ownerId = null) {
    const r = el.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) return;
    obstacles.push({
      left: r.left,
      top: r.top,
      right: r.right,
      bottom: r.bottom,
      ownerId: ownerId
    });
  }
  measured.forEach(m => pushRect(m.it.pin, m.it.shop.id));
  document.querySelectorAll('.coffee-cluster').forEach(el => pushRect(el));

  function rectForAngle(m, angleDeg) {
    const rad = angleDeg * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    // distance so the label's near edge sits LABEL_GAP from the pin's edge
    const horiz = Math.abs(cos) * m.lw / 2;
    const vert = Math.abs(sin) * m.lh / 2;
    const labelExtent = Math.sqrt(horiz * horiz + vert * vert);
    const d = m.pinR + LABEL_GAP + labelExtent;
    const dx = cos * d;
    const dy = -sin * d; // screen y goes down
    const cx = m.cx + dx, cy = m.cy + dy;
    return {
      dx, dy,
      left: cx - m.lw / 2, top: cy - m.lh / 2,
      right: cx + m.lw / 2, bottom: cy + m.lh / 2
    };
  }
  // Priority: higher-weighted shops claim labels first
  measured.sort((a, b) => (b.it.shop.weightedRating || 0) - (a.it.shop.weightedRating || 0));
  measured.forEach(m => {
    let chosen = null;
    for (const angle of LABEL_ANGLES) {
      const r = rectForAngle(m, angle);
      const collides = obstacles.some(p => {
        // Exclude the shop's own pin (and its own placed labels if any)
        if (p.ownerId === m.it.shop.id) return false;
        return !(r.right <= p.left || r.left >= p.right || r.bottom <= p.top || r.top >= p.bottom);
      });
      if (!collides) {
        chosen = r;
        obstacles.push({
          left: r.left,
          top: r.top,
          right: r.right,
          bottom: r.bottom,
          ownerId: m.it.shop.id
        });
        break;
      }
    }
    if (chosen) {
      m.it.label.style.transform =
        `translate(-50%, -50%) translate(${chosen.dx}px, ${chosen.dy}px)`;
      m.it.label.style.visibility = 'visible';
    } else {
      m.it.label.style.visibility = 'hidden';
    }
  });
}

  __labelTimer = setTimeout(placeLabels, 60);
}
map.on('zoomend', () => { toggleLabels(); scheduleLabels(); });
map.on('moveend', scheduleLabels);
clusterGroup.on('animationend spiderfied unspiderfied', scheduleLabels);
toggleLabels();
scheduleLabels();

function setMarkerSelected(shop) {
  markers.forEach(m => {
    m.setIcon(makeIcon(m.shopRef, shop && m.shopRef.id === shop.id));
  });
}

// LIST
const shopListEl = document.getElementById('shopList');
const resultsCountEl = document.getElementById('resultsCount');
const searchInput = document.getElementById('searchInput');

// Global filters (category / feature / search) — these gate BOTH map markers and the list.
function passesGlobalFilters(s) {
  const term = state.search.toLowerCase().trim();
  if (state.categories.size && !state.categories.has(s.category)) return false;
  const cw = CWS[s.name] || {};
  const ln = LATE[s.name];
  if (state.features.has('work') && cw.tier !== 'excellent') return false;
  if (state.features.has('meeting') && !cw.hasMeetingRoom) return false;
  if (state.features.has('late') && !ln) return false;
  if (state.features.has('midnight') && (!ln || ln.tier !== 'midnight')) return false;
  if (!term) return true;
  const hay = [
    s.name,
    s.usp,
    s.signature,
    s.category,
    s.neighborhood,
    cw.tier || '',
    cw.note || '',
    ln ? ln.tier : '',
    ln ? ln.when : '',
    ...(s.loved || [])
  ].join(' ').toLowerCase();
  const words = term.split(/\s+/);
  return words.every(word => hay.includes(word));
}

// Shops eligible to live on the map (global filters only — no viewport).
function filteredForMap() {
  return SHOPS.filter(passesGlobalFilters);
}

// Shops shown in the right-hand list (global filters + current map viewport).
function filteredForList() {
  const view = (typeof map !== 'undefined' && map && map._loaded) ? map.getBounds() : null;
  return SHOPS.filter(s => {
    if (!passesGlobalFilters(s)) return false;
    if (view && !view.contains([s.lat, s.lng])) return false;
    return true;
  });
}

function sortShops(arr) {
  // Always sort by Bayesian weighted rating (best → worst).
  return arr.slice().sort((x, y) => y.weightedRating - x.weightedRating);
}

function renderList() {
  // Map cluster membership tracks global filters only — viewport filtering must not
  // shrink clusterGroup.getBounds() (otherwise later fitBounds calls fit to a tiny set).
  const mapSet = new Set(filteredForMap());
  markers.forEach(m => {
    const onMap = mapSet.has(m.shopRef);
    if (onMap && !clusterGroup.hasLayer(m)) clusterGroup.addLayer(m);
    else if (!onMap && clusterGroup.hasLayer(m)) clusterGroup.removeLayer(m);
  });
  const filtered = sortShops(filteredForList());
  resultsCountEl.textContent = filtered.length;
  shopListEl.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('li');
    empty.className = 'empty-state';
    empty.textContent = 'No shops in this view. Try zooming out, clearing filters, or changing search.';
    shopListEl.appendChild(empty);
  }
  filtered.forEach(shop => {
    const li = document.createElement('li');
    li.className = 'shop-item' + (state.selected && state.selected.id === shop.id ? ' active' : '');
    li.dataset.id = shop.id;
    li.setAttribute('tabindex', '0');
    li.setAttribute('role', 'button');
    const cleanCat = shop.category.replace('+', ' and ');
    li.setAttribute('aria-label', `${shop.name}, ${cleanCat} in ${shop.neighborhood}`);

    const cat = CATS[shop.category] || {};
    const catColor = cat.hex || '#999';
    const catIcon = cat.icon || '';
    li.style.borderLeftColor = catColor;
    const tags = compactTags(shop);
    const tagsHtml = tags.map((t, i) => (i > 0 ? '<span class="tag-sep">·</span>' : '') + t).join('');
    const ratingHtml = shop.rating
      ? `<span class="rating">★ ${shop.rating}</span> <span class="muted">(${shop.ratingCount})</span>`
      : `<span class="muted">no rating</span>`;
    li.innerHTML = `
      <div class="shop-name"><span class="shop-icon-tile" style="background:${catColor}">${catIcon}</span>${shop.name}</div>
      <div class="shop-meta">${shop.category.replace('+', ' & ')} · ${ratingHtml} · ${shop.neighborhood}</div>
      <div class="shop-tags">${tagsHtml}</div>
    `;
    
    const triggerSelect = () => selectShop(shop);
    li.addEventListener('click', triggerSelect);
    li.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        triggerSelect();
      }
    });
    
    shopListEl.appendChild(li);
  });
  if (typeof scheduleLabels === 'function') scheduleLabels();
}

// DETAIL
const panelEl = document.getElementById('panel');
const detailEl = document.getElementById('detailView');

function renderDetail(shop) {
  const cat = CATS[shop.category] || {};
  const cw = CWS[shop.name];
  const ln = LATE[shop.name];
  const site = WEBSITES[shop.name];
  const host = websiteHost(site);
  const bft = bestForTags(shop);
  const ratingHtml = shop.rating
    ? `<span class="star">★</span> <b>${shop.rating}</b> <span class="muted">· ${shop.ratingCount} reviews</span>`
    : `<span class="muted">No public rating yet</span>`;

  let html = `
    <button class="back-btn" id="backBtn">← Back to list</button>
    <div class="detail-header">
      <div class="detail-cat"><span class="dot" style="background:${cat.hex}"></span>${shop.category.replace('+',' & ')} · ${shop.neighborhood}</div>
      <h2 class="detail-name">${shop.name}</h2>
      <div class="detail-rating">${ratingHtml}</div>
    </div>
    <div class="detail-section">
      <div class="detail-text">${shop.usp}</div>
    </div>
  `;
  if (bft.length) {
    html += `<div class="detail-section">
      <div class="detail-section-label">Best for</div>
      <div class="tag-row">${bft.map(t => `<span class="pill-tag feature ${t.cls}">${t.icon ? t.icon + ' ' : ''}${t.label}</span>`).join('')}</div>
    </div>`;
  }
  html += `<div class="detail-section">
    <div class="detail-section-label">Known for</div>
    <div class="tag-row">${(shop.loved || []).map(l => `<span class="pill-tag">${l}</span>`).join('')}</div>
    <div class="detail-text-muted" style="margin-top:8px;">Try the <b>${shop.signature}</b>.</div>
  </div>`;
  html += `<div class="detail-section">
    <div class="detail-section-label">Location & hours</div>
    <div class="detail-text-muted">${shop.address}</div>
    <div class="detail-text-muted" style="margin-top:4px;">${shop.hours}</div>
  </div>`;
  if (cw) {
    const tierLabel = { excellent: 'Coworking-ready', good: 'Workable', limited: 'Quick-grab' }[cw.tier];
    html += `<div class="detail-section">
      <div class="detail-section-label">Coworking</div>
      <div class="detail-text"><b>${tierLabel}.</b> ${cw.note}</div>
      ${cw.hasMeetingRoom ? `<div class="callout">
        <div class="callout-label">Reservable meeting room</div>
        <div class="callout-text">${cw.meetingRoomNote || 'Private/meeting room available on demand'}</div>
      </div>` : ''}
    </div>`;
  }
  if (ln) {
    const lnLabel = ln.tier === 'midnight' ? 'Open until midnight' : 'Open till 10pm+';
    html += `<div class="detail-section">
      <div class="detail-section-label">Late-night</div>
      <div class="detail-text"><b>${lnLabel}.</b> ${ln.when}</div>
    </div>`;
  }
  html += `<div class="actions">
    <a class="action-btn" href="${shop.googleUrl}" target="_blank" rel="noopener">Google Maps</a>
    <a class="action-btn" href="${shop.yelpUrl}" target="_blank" rel="noopener">Yelp</a>
    ${site ? `<a class="action-btn" href="${site}" target="_blank" rel="noopener">${host}</a>` : ''}
  </div>`;
  detailEl.innerHTML = html;
  document.getElementById('backBtn').addEventListener('click', deselectShop);
}

function selectShop(shop, opts) {
  opts = opts || {};
  // Save scroll position of the list before entering detail mode
  state.lastScrollTop = shopListEl.scrollTop;
  state.selected = shop;
  renderDetail(shop);
  panelEl.classList.add('detail-mode');
  detailEl.classList.add('visible');
  setMarkerSelected(shop);
  // Trigger immediate label placement since the selection ring changed the marker's size
  if (typeof scheduleLabels === 'function') scheduleLabels();

  if (opts.recenterMap !== false) {
    const m = markers.find(mm => mm.shopRef.id === shop.id);
    if (m) clusterGroup.zoomToShowLayer(m, () => {
      map.setView([shop.lat, shop.lng], Math.max(map.getZoom(), 16), { animate: true });
    });
  }
}

function deselectShop() {
  const lastSelectedId = state.selected ? state.selected.id : null;
  state.selected = null;
  panelEl.classList.remove('detail-mode');
  detailEl.classList.remove('visible');
  setMarkerSelected(null);
  renderList();

  // Restore scroll position
  if (state.lastScrollTop !== undefined) {
    shopListEl.scrollTop = state.lastScrollTop;
  }

  // Restore keyboard focus to the list item that was open
  if (lastSelectedId) {
    const el = shopListEl.querySelector(`[data-id="${lastSelectedId}"]`);
    if (el) el.focus();
  }

  // Reset the map back to the full-spread view
  if (clusterGroup.getLayers().length) {
    map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40], animate: true });
  }
}

function render() {
  renderChips();
  if (state.selected) renderDetail(state.selected);
  renderList();
}

searchInput.addEventListener('input', e => { state.search = e.target.value; renderList(); });

// Initialize dynamic freshness count with hardcoded date
document.querySelector('.freshness').textContent = `${SHOPS.length} cafés, bakeries & tea shops · checked May 2026`;

render();
</script>
</body>
</html>
